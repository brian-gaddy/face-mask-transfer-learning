<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <rect width="1200" height="720" fill="#ffffff"/>
  <text x="600" y="42" text-anchor="middle" font-family="Arial" font-size="28" font-weight="700" fill="#1f2937">Face Mask Detection — Example Prediction Grid</text>
  <text x="600" y="72" text-anchor="middle" font-family="Arial" font-size="14" fill="#6b7280">Representative 10-image layout for true vs predicted labels. Regenerate with local images/model for exact examples.</text>
  <defs>
    <style>.card{fill:#f9fafb;stroke:#d1d5db;stroke-width:2}.face{fill:#fde68a;stroke:#92400e;stroke-width:2}.mask{fill:#bfdbfe;stroke:#1d4ed8;stroke-width:2}.txt{font-family:Arial;font-size:14px;fill:#111827}.small{font-family:Arial;font-size:12px;fill:#4b5563}.ok{fill:#16a34a}.warn{fill:#ca8a04}</style>
  </defs>
  <g transform="translate(40,105)">
    <g transform="translate(0,0)"><rect class="card" width="200" height="240" rx="16"/><circle class="face" cx="100" cy="83" r="42"/><rect class="mask" x="61" y="82" width="78" height="28" rx="8"/><text class="txt" x="100" y="170" text-anchor="middle">True: with_mask</text><text class="small ok" x="100" y="196" text-anchor="middle">Pred: with_mask</text></g>
    <g transform="translate(230,0)"><rect class="card" width="200" height="240" rx="16"/><circle class="face" cx="100" cy="83" r="42"/><text class="txt" x="100" y="170" text-anchor="middle">True: without_mask</text><text class="small ok" x="100" y="196" text-anchor="middle">Pred: without_mask</text></g>
    <g transform="translate(460,0)"><rect class="card" width="200" height="240" rx="16"/><circle class="face" cx="100" cy="83" r="42"/><rect class="mask" x="70" y="96" width="60" height="18" rx="6" transform="rotate(-12 100 105)"/><text class="txt" x="100" y="170" text-anchor="middle">True: incorrect_mask</text><text class="small ok" x="100" y="196" text-anchor="middle">Pred: incorrect_mask</text></g>
    <g transform="translate(690,0)"><rect class="card" width="200" height="240" rx="16"/><circle class="face" cx="100" cy="83" r="42"/><rect class="mask" x="61" y="82" width="78" height="28" rx="8"/><text class="txt" x="100" y="170" text-anchor="middle">True: with_mask</text><text class="small ok" x="100" y="196" text-anchor="middle">Pred: with_mask</text></g>
    <g transform="translate(920,0)"><rect class="card" width="200" height="240" rx="16"/><circle class="face" cx="100" cy="83" r="42"/><text class="txt" x="100" y="170" text-anchor="middle">True: without_mask</text><text class="small ok" x="100" y="196" text-anchor="middle">Pred: without_mask</text></g>
    <g transform="translate(0,285)"><rect class="card" width="200" height="240" rx="16"/><circle class="face" cx="100" cy="83" r="42"/><rect class="mask" x="70" y="96" width="60" height="18" rx="6" transform="rotate(16 100 105)"/><text class="txt" x="100" y="170" text-anchor="middle">True: incorrect_mask</text><text class="small warn" x="100" y="196" text-anchor="middle">Pred: with_mask</text></g>
    <g transform="translate(230,285)"><rect class="card" width="200" height="240" rx="16"/><circle class="face" cx="100" cy="83" r="42"/><rect class="mask" x="61" y="82" width="78" height="28" rx="8"/><text class="txt" x="100" y="170" text-anchor="middle">True: with_mask</text><text class="small ok" x="100" y="196" text-anchor="middle">Pred: with_mask</text></g>
    <g transform="translate(460,285)"><rect class="card" width="200" height="240" rx="16"/><circle class="face" cx="100" cy="83" r="42"/><text class="txt" x="100" y="170" text-anchor="middle">True: without_mask</text><text class="small ok" x="100" y="196" text-anchor="middle">Pred: without_mask</text></g>
    <g transform="translate(690,285)"><rect class="card" width="200" height="240" rx="16"/><circle class="face" cx="100" cy="83" r="42"/><rect class="mask" x="61" y="82" width="78" height="28" rx="8"/><text class="txt" x="100" y="170" text-anchor="middle">True: with_mask</text><text class="small ok" x="100" y="196" text-anchor="middle">Pred: with_mask</text></g>
    <g transform="translate(920,285)"><rect class="card" width="200" height="240" rx="16"/><circle class="face" cx="100" cy="83" r="42"/><text class="txt" x="100" y="170" text-anchor="middle">True: without_mask</text><text class="small ok" x="100" y="196" text-anchor="middle">Pred: without_mask</text></g>
  </g>
</svg>
